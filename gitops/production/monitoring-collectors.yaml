apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-collectors
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/production/monitoring/collectors
  prune: true
  dependsOn:
    - name: monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
