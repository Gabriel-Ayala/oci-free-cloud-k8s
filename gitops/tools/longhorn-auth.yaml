apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-auth
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/core/longhorn-auth/tools
  prune: true
  dependsOn:
    - name: external-secrets
    - name: longhorn
  sourceRef:
    kind: GitRepository
    name: flux-system
