apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: home-hackyard-dev
  namespace: external-dns
spec:
  endpoints:
    - dnsName: home.hackyard.dev
      recordTTL: 300
      recordType: A
      targets:
        - 192.168.1.221
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: wildcard-home-hackyard-dev
  namespace: external-dns
spec:
  endpoints:
    - dnsName: "*.home.hackyard.dev"
      recordTTL: 300
      recordType: A
      targets:
        - 192.168.1.221
