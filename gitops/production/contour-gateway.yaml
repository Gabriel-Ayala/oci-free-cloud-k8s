apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: contour-gateway
  namespace: flux-system
spec:
  interval: 1h
  path: ./gitops/core/contour-gateway/
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: contour
    - name: cert-manager-issuer
  healthChecks:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: GatewayClass
      name: contour
    - apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      name: contour
      namespace: contour
