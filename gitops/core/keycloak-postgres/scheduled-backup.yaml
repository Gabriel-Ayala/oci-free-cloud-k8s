apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: keycloak-postgres-daily
  namespace: keycloak
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: keycloak-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
