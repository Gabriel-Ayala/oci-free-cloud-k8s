apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: contour
spec:
  interval: 5m
  url: https://projectcontour.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: contour
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: contour
      version: "0.6.0"
      sourceRef:
        kind: HelmRepository
        name: contour
      interval: 5m
  releaseName: contour
  valuesFrom:
    - kind: ConfigMap
      name: oci-lb-sg-id
      valuesKey: values.yaml
      optional: true
  values:
    configInline:
      gateway:
        gatewayRef:
          name: contour
          namespace: contour
      disablePermitInsecure: false
      tls:
        minimum-protocol-version: "1.2"
    contour:
      replicaCount: 2
    envoy:
      replicaCount: 2
      kind: deployment
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          service.beta.kubernetes.io/oci-load-balancer-shape: flexible
          service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
          service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "10"
    gatewayAPI:
      manageCRDs: true
