apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak-postgres
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/core/keycloak-postgres
  prune: true
  dependsOn:
    - name: cloudnative-pg
    - name: external-secrets
    - name: cert-manager
    - name: keycloak-operator
  sourceRef:
    kind: GitRepository
    name: flux-system
