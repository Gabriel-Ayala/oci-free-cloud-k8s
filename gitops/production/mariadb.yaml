apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mariadb-cluster
  namespace: flux-system
spec:
  interval: 30m
  path: ./gitops/production/mariadb
  prune: true
  dependsOn:
    - name: mariadb-operator
    - name: external-secrets
    - name: longhorn
  sourceRef:
    kind: GitRepository
    name: flux-system
